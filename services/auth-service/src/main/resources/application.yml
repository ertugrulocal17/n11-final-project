spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:commerce_auth}
    username: ${AUTH_DB_USER:commerce}
    password: ${AUTH_DB_PASSWORD:commerce}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

server:
  port: ${AUTH_SERVICE_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${APP_JWT_SECRET:commerce-dev-jwt-secret-key-min-32-chars!!}
    expiration-ms: 86400000

logging:
  level:
    root: INFO
