spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:postgresql://${CART_DB_HOST:localhost}:${CART_DB_PORT:5432}/${CART_DB_NAME:commerce_cart}
    username: ${CART_DB_USER:commerce}
    password: ${CART_DB_PASSWORD:commerce}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${PORT:${CART_SERVICE_PORT:8083}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${APP_JWT_SECRET:commerce-dev-jwt-secret-key-min-32-chars!!}
    expiration-ms: 86400000

commerce:
  services:
    product-base-url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
  internal:
    service-token: ${COMMERCE_INTERNAL_SERVICE_TOKEN:dev-internal-token}

logging:
  level:
    root: INFO
